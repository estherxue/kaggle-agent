# Kaggle Agent Configuration

# LLM Provider Configuration
llm:
  providers:
    - name: "cursor"
      type: "cursor"
      model: "cursor-agent"
      cost_per_1k_prompt: 0.0
      cost_per_1k_completion: 0.0

    # Legacy OpenAI provider (optional)
    # - name: "openai"
    #   type: "placeholder"
    #   api_key_env: "OPENAI_API_KEY"
    #   model: "gpt-4o-mini"
    #   cost_per_1k_prompt: 0.15
    #   cost_per_1k_completion: 0.60

  roles:
    planner: "cursor"
    coder: "cursor"
    reviewer: "cursor"
    summarizer: "cursor"

  # Default parameters for all roles
  default:
    temperature: 0.7
    max_tokens: 4096

# Budget and Safety Limits
budget:
  # Maximum number of experiments per competition
  max_experiments_per_competition: 50
  # Maximum LLM cost in USD per competition
  max_llm_cost_usd: 50.0
  # Maximum execution time per experiment in seconds
  max_execution_time_per_exp_sec: 600
  # Maximum Kaggle submissions per day
  max_submissions_per_day: 5
  # Minimum CV improvement required before auto-submit (0 = always submit best)
  min_cv_improvement_threshold: 0.0

# Paths (relative to project root)
paths:
  knowledge: "knowledge"
  competitions: "competitions"

# Execution settings
execution:
  # Timeout for code execution in seconds
  timeout_sec: 300
  # Whether to allow network access during code execution
  allow_network: false
  # Python interpreter to use (null = system default)
  python_path: null

# Kaggle settings
kaggle:
  # Whether to auto-submit after finding a good CV score
  auto_submit: true
  # Dry run mode - don't actually submit (for testing)
  dry_run: false
